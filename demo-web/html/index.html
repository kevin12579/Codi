<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskBoard — Codi Demo</title>
  <style>
    :root { --blue:#0066ff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#f8fafc; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--ink); }
    .wrap { max-width: 560px; margin: 0 auto; padding: 48px 20px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:20px; padding:28px; box-shadow:0 6px 24px rgba(15,23,42,.05); }
    h1 { margin:0 0 4px; font-size:26px; color:var(--blue); letter-spacing:-.5px; }
    .sub { color:var(--muted); font-size:13px; margin:0 0 22px; }
    label { display:block; font-size:12px; font-weight:700; color:var(--muted); margin:14px 0 6px; }
    input[type=text], input[type=email], input[type=password] {
      width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:12px; font-size:14px; outline:none;
    }
    input:focus { border-color:var(--blue); }
    button { background:var(--blue); color:#fff; border:0; padding:12px 18px; border-radius:12px; font-weight:800; cursor:pointer; font-size:14px; }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .ghost { background:#fff; color:var(--muted); border:1px solid var(--line); }
    .hint { font-size:12px; color:var(--muted); margin-top:14px; }
    .error { display:none; background:#fef2f2; color:#dc2626; border:1px solid #fecaca; border-radius:10px; padding:10px 12px; font-size:13px; font-weight:600; margin-top:14px; }
    .error.show { display:block; }
    .row { display:flex; gap:8px; }
    .row input { flex:1; }
    header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
    header .who { font-size:12px; color:var(--muted); }
    .tabs { display:flex; gap:6px; margin:16px 0 10px; }
    .tab { padding:6px 12px; border-radius:999px; font-size:12px; font-weight:700; background:#eef2f7; color:var(--muted); border:0; cursor:pointer; }
    .tab.active { background:var(--blue); color:#fff; }
    ul { list-style:none; padding:0; margin:0; }
    li { display:flex; align-items:center; gap:10px; padding:12px 4px; border-bottom:1px solid #f1f5f9; }
    li.done .txt { text-decoration:line-through; color:#94a3b8; }
    li .txt { flex:1; font-size:14px; font-weight:600; }
    li .del { background:none; border:0; color:#cbd5e1; font-size:16px; cursor:pointer; padding:2px 6px; }
    li .del:hover { color:#ef4444; }
    .foot { display:flex; justify-content:space-between; align-items:center; margin-top:14px; font-size:12px; color:var(--muted); }
    .empty { text-align:center; color:#94a3b8; font-size:13px; padding:26px 0; }
    input[type=checkbox]{ width:17px; height:17px; accent-color:var(--blue); }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- 로그인 화면 -->
    <div class="card" id="login" data-testid="login-view">
      <h1>TaskBoard</h1>
      <p class="sub">Codi 파이프라인 데모용 샘플 앱 · 로그인 후 할 일을 관리하세요</p>

      <label for="email">이메일</label>
      <input id="email" type="email" data-testid="email" placeholder="you@example.com" autocomplete="off" />

      <label for="password">비밀번호</label>
      <input id="password" type="password" data-testid="password" placeholder="••••••••" autocomplete="off" />

      <div class="error" id="loginError" data-testid="login-error">이메일 또는 비밀번호가 올바르지 않습니다.</div>

      <div style="margin-top:18px">
        <button data-testid="login-btn" onclick="login()">로그인</button>
      </div>
      <p class="hint">데모 계정 — <b>demo@codi.dev</b> / <b>codi1234</b></p>
    </div>

    <!-- 태스크 보드 화면 -->
    <div class="card" id="board" data-testid="board-view" hidden>
      <header>
        <div>
          <h1 style="font-size:20px">TaskBoard</h1>
          <span class="who" data-testid="user-email"></span>
        </div>
        <button class="ghost" data-testid="logout-btn" onclick="logout()">로그아웃</button>
      </header>

      <div class="row">
        <input id="taskInput" type="text" data-testid="task-input" placeholder="새 할 일을 입력하세요" oninput="syncAddBtn()" onkeydown="if(event.key==='Enter')addTask()" />
        <button id="addBtn" data-testid="add-btn" onclick="addTask()" disabled>추가</button>
      </div>

      <div class="tabs">
        <button class="tab active" data-testid="filter-all" onclick="setFilter('all', this)">전체</button>
        <button class="tab" data-testid="filter-active" onclick="setFilter('active', this)">진행중</button>
        <button class="tab" data-testid="filter-done" onclick="setFilter('done', this)">완료</button>
      </div>

      <ul id="list" data-testid="task-list"></ul>
      <div class="empty" id="empty" data-testid="empty-state">할 일이 없습니다. 위에서 추가해보세요.</div>

      <div class="foot">
        <span data-testid="remaining">0개 남음</span>
        <button class="ghost" data-testid="clear-done" onclick="clearDone()">완료 항목 지우기</button>
      </div>
    </div>

  </div>

  <script>
    const DEMO = { email: 'demo@codi.dev', password: 'codi1234' };
    let tasks = [];
    let seq = 0;
    let filter = 'all';

    function login() {
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      const err = document.getElementById('loginError');
      if (email === DEMO.email && pw === DEMO.password) {
        err.classList.remove('show');
        document.getElementById('login').hidden = true;
        document.getElementById('board').hidden = false;
        document.querySelector('[data-testid=user-email]').textContent = email;
      } else {
        err.classList.add('show');
      }
    }

    function logout() {
      document.getElementById('board').hidden = true;
      document.getElementById('login').hidden = false;
      document.getElementById('password').value = '';
    }

    function syncAddBtn() {
      const v = document.getElementById('taskInput').value.trim();
      document.getElementById('addBtn').disabled = v.length === 0;
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const v = input.value.trim();
      if (!v) return;
      tasks.push({ id: ++seq, text: v, done: false });
      input.value = '';
      syncAddBtn();
      render();
    }

    function toggle(id) {
      const t = tasks.find(t => t.id === id);
      if (t) { t.done = !t.done; render(); }
    }

    function del(id) {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      render();
    }

    function setFilter(f, el) {
      filter = f;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const shown = tasks.filter(t => filter === 'all' ? true : filter === 'active' ? !t.done : t.done);
      list.innerHTML = '';
      shown.forEach(t => {
        const li = document.createElement('li');
        li.className = t.done ? 'done' : '';
        li.setAttribute('data-testid', 'task-' + t.id);
        li.innerHTML =
          '<input type="checkbox" data-testid="check-' + t.id + '" ' + (t.done ? 'checked' : '') + ' onclick="toggle(' + t.id + ')">' +
          '<span class="txt">' + t.text.replace(/</g, '&lt;') + '</span>' +
          '<button class="del" data-testid="del-' + t.id + '" onclick="del(' + t.id + ')">✕</button>';
        list.appendChild(li);
      });
      document.getElementById('empty').style.display = shown.length ? 'none' : 'block';
      const remaining = tasks.filter(t => !t.done).length;
      document.querySelector('[data-testid=remaining]').textContent = remaining + '개 남음';
    }

    render();
  </script>
</body>
</html>
