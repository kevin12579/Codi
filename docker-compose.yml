version: '3.8'

services:
  api:
    build: ./codeai-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:postgresql://postgres:5432/${DB_NAME}
      - REDIS_HOST=redis
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CODEAI_API_KEY=${CODEAI_API_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - codeai-net

  frontend:
    build:
      context: ./codeai-frontend
      args:
        - VITE_API_URL=http://localhost:8080
    ports:
      - "3000:80"
    networks:
      - codeai-net

  postgres:
    image: postgres:15
    container_name: codeai-postgres
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./codeai-backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    networks:
      - codeai-net
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: codeai-redis
    volumes:
      - redis_data:/data
    networks:
      - codeai-net
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: codeai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - codeai-net

  grafana:
    image: grafana/grafana:latest
    container_name: codeai-grafana
    ports:
      - "3001:3000"
    networks:
      - codeai-net

volumes:
  postgres_data:
  redis_data:

networks:
  codeai-net:
    driver: bridge
