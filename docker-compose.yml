services:
  api:
    build: ./codeai-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      # AI 엔진 다중화 (Phase 4) — 키 미설정 시 빈값 허용
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CODEAI_API_KEY=${CODEAI_API_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - JWT_SECRET=${JWT_SECRET:-codeai-jwt-secret-key-must-be-at-least-256-bits-long-for-security}
      # 커넥터 키 AES-256 암호화 (Phase 5)
      - AES_SECRET_KEY=${AES_SECRET_KEY:-}
      # Playwright 전용 컨테이너
      - PLAYWRIGHT_SERVER_URL=${PLAYWRIGHT_SERVER_URL:-http://playwright-server:3001}
      - PLAYWRIGHT_ENABLED=${PLAYWRIGHT_ENABLED:-false}
      # E2E 대상 웹앱 (Track B: demo-web)
      - FRONTEND_URL=${FRONTEND_URL:-http://demo-web:80}
      # 대시보드 레포 등록 시 발급되는 공개 Webhook URL (ngrok)
      - WEBHOOK_CALLBACK_URL=${WEBHOOK_CALLBACK_URL:-http://localhost:8080/webhook/github}
    depends_on:
      - postgres
      - redis
    networks:
      - codeai-net

  playwright-server:
    build:
      context: ./playwright-server
    ports:
      - "3001:3001"
    environment:
      - BASE_URL=${FRONTEND_URL:-http://demo-web:80}
    depends_on:
      - demo-web
    networks:
      - codeai-net

  # Track B: E2E 대상 데모 웹앱 (정적 페이지, nginx). playwright-server 가 이 앱에 대고 테스트.
  demo-web:
    image: nginx:alpine
    container_name: codeai-demo-web
    ports:
      - "8090:80"
    volumes:
      - ./demo-web/html:/usr/share/nginx/html:ro
    networks:
      - codeai-net

  # v0.9(D12, V1-B 도전): Caddy 리버스 프록시 — 자동 HTTPS/TLS 진입점
  caddy:
    image: caddy:2-alpine
    container_name: codeai-caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - codeai-net

  postgres:
    image: postgres:15
    container_name: codeai-postgres
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codeai-net
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: codeai-redis
    volumes:
      - redis_data:/data
    networks:
      - codeai-net
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: codeai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - codeai-net

  grafana:
    image: grafana/grafana:latest
    container_name: codeai-grafana
    ports:
      # P3에서 playwright-server가 host 3001을 사용 → grafana는 3002로 이동(포트 충돌 해소).
      - "3002:3000"
    networks:
      - codeai-net

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  codeai-net:
    driver: bridge
